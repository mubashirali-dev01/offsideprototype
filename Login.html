<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Offside Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a0e1a;
            --secondary: #131a2e;
            --card-bg: #161d32;
            --accent: #00e676;
            --accent-dark: #00c853;
            --accent-glow: rgba(0, 230, 118, 0.25);
            --border: #1e2a45;
            --text: #e2e8f0;
            --text-muted: #7a8bb5;
            --danger: #ff5252;
            --info: #448aff;
            --warning: #ffd740;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(0, 230, 118, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(68, 138, 255, 0.03) 0%, transparent 50%);
            animation: bgFloat 15s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-2%, -2%); }
        }

        /* Navbar */
        .navbar {
            background: rgba(10, 14, 26, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 0;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.35rem;
            color: var(--text) !important;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-brand .logo-icon {
            width: 38px;
            height: 38px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 18px;
        }

        .nav-link {
            color: var(--text-muted) !important;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 8px 18px !important;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-link:hover { color: var(--accent) !important; background: rgba(0,230,118,0.08); }

        .btn-nav-register {
            background: var(--accent) !important;
            color: var(--primary) !important;
            font-weight: 600 !important;
            border-radius: 8px !important;
            padding: 8px 20px !important;
        }

        .btn-nav-register:hover {
            background: var(--accent-dark) !important;
            transform: translateY(-1px);
        }

        /* Auth Container */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
            position: relative;
            z-index: 1;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--info));
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .auth-logo .icon-circle {
            width: 72px;
            height: 72px;
            background: rgba(0, 230, 118, 0.1);
            border: 2px solid rgba(0, 230, 118, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 30px;
            color: var(--accent);
        }

        .auth-logo h2 {
            font-weight: 700;
            font-size: 1.6rem;
            margin-bottom: 6px;
        }

        .auth-logo p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Form Elements */
        .form-label-custom {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.88rem;
            margin-bottom: 8px;
            display: block;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            z-index: 2;
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            background: var(--primary);
            border: 1.5px solid var(--border);
            color: var(--text);
            padding: 14px 16px 14px 46px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-wrapper input:focus + i,
        .input-wrapper input:focus ~ i {
            color: var(--accent);
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .input-wrapper .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            left: auto;
            cursor: pointer;
            color: var(--text-muted);
        }

        .input-wrapper .toggle-password:hover {
            color: var(--accent);
        }

        /* Checkbox */
        .form-check-input:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .form-check-label {
            font-size: 0.88rem;
            color: var(--text-muted);
        }

        /* Buttons */
        .btn-accent {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: var(--primary);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-accent:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        .btn-accent:active {
            transform: translateY(0);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span { padding: 0 16px; }

        /* Error Alert */
        .alert-error {
            background: rgba(255, 82, 82, 0.08);
            border: 1px solid rgba(255, 82, 82, 0.2);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.88rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Links */
        .auth-link {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .auth-link:hover {
            color: var(--accent-dark);
            text-decoration: underline;
        }

        /* Footer */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeInUp 0.6s ease forwards;
        }

        /* Responsive */
        @media (max-width: 576px) {
            .auth-card { padding: 35px 24px; margin: 0 10px; }
            .auth-logo h2 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="#">
                <span class="logo-icon"><i class="fas fa-futbol"></i></span>
                AI Offside Detection
            </a>
            <div class="d-flex gap-2">
                <a href="login.html" class="nav-link active" style="color: var(--accent) !important;">
                    <i class="fas fa-sign-in-alt"></i> Login
                </a>
                <a href="Register.html" class="nav-link btn-nav-register">
                    <i class="fas fa-user-plus"></i> Register
                </a>
            </div>
        </div>
    </nav>

    <!-- LOGIN FORM -->
    <div class="auth-wrapper">
        <div class="auth-card animate-in">

            <div class="auth-logo">
                <div class="icon-circle">
                    <i class="fas fa-futbol"></i>
                </div>
                <h2>Welcome Back</h2>
                <p>Sign in to your account to continue</p>
            </div>

            <!-- Error Message (Hidden by default) -->
            <!-- 
            <div class="alert-error">
                <i class="fas fa-exclamation-circle"></i>
                Invalid username or password. Please try again.
            </div>
            -->

            <form>
                <!-- Username -->
                <label class="form-label-custom">Username or Email</label>
                <div class="input-wrapper">
                    <input type="text" placeholder="Enter your username or email" required>
                    <i class="fas fa-user"></i>
                </div>

                <!-- Password -->
                <label class="form-label-custom">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <i class="fas fa-lock"></i>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                </div>

                <!-- Remember + Forgot -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <a href="#" class="auth-link" style="font-size: 0.85rem;">Forgot Password?</a>
                </div>

                <!-- Login Button -->
                <button type="button" class="btn-accent" onclick="window.location='Dashboard.html'">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="divider"><span>OR</span></div>

            <div class="auth-footer">
                Don't have an account? 
                <a href="Register.html" class="auth-link">Create Account</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            var pwd = document.getElementById('password');
            var icon = document.querySelector('.toggle-password');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
