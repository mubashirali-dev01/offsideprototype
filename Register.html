<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Offside Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a0e1a;
            --secondary: #131a2e;
            --card-bg: #161d32;
            --accent: #00e676;
            --accent-dark: #00c853;
            --accent-glow: rgba(0, 230, 118, 0.25);
            --border: #1e2a45;
            --text: #e2e8f0;
            --text-muted: #7a8bb5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(0,230,118,0.03) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(68,138,255,0.03) 0%, transparent 50%);
            z-index: 0;
        }
        .navbar {
            background: rgba(10,14,26,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 0;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }
        .navbar-brand {
            font-weight: 800; font-size: 1.35rem;
            color: var(--text) !important;
            display: flex; align-items: center; gap: 10px;
        }
        .logo-icon {
            width: 38px; height: 38px;
            background: var(--accent); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: var(--primary); font-size: 18px;
        }
        .nav-link {
            color: var(--text-muted) !important;
            font-weight: 500; padding: 8px 18px !important;
            border-radius: 8px; transition: all 0.3s;
        }
        .nav-link:hover { color: var(--accent) !important; }
        .btn-nav { background: var(--accent) !important; color: var(--primary) !important; font-weight: 600 !important; border-radius: 8px !important; }
        .auth-wrapper {
            min-height: 100vh; display: flex; align-items: center;
            justify-content: center; padding: 100px 20px 40px;
            position: relative; z-index: 1;
        }
        .auth-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 24px; padding: 44px 40px;
            width: 100%; max-width: 560px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
        }
        .auth-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 3px; background: linear-gradient(90deg, var(--accent), #448aff);
        }
        .auth-logo { text-align: center; margin-bottom: 30px; }
        .icon-circle {
            width: 72px; height: 72px;
            background: rgba(0,230,118,0.1); border: 2px solid rgba(0,230,118,0.2);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 18px;
            font-size: 30px; color: var(--accent);
        }
        .auth-logo h2 { font-weight: 700; font-size: 1.5rem; margin-bottom: 6px; }
        .auth-logo p { color: var(--text-muted); font-size: 0.9rem; }
        .section-divider {
            font-weight: 600; font-size: 0.95rem; color: var(--accent);
            margin: 24px 0 16px; padding-bottom: 8px;
            border-bottom: 1.5px solid var(--border);
            display: flex; align-items: center; gap: 8px;
        }
        .form-label-custom {
            color: var(--text-muted); font-weight: 500;
            font-size: 0.85rem; margin-bottom: 6px; display: block;
        }
        .input-wrapper {
            position: relative; margin-bottom: 16px;
        }
        .input-wrapper i.icon {
            position: absolute; left: 16px; top: 50%;
            transform: translateY(-50%); color: var(--text-muted);
            font-size: 14px; z-index: 2;
        }
        .input-wrapper input, .input-wrapper select {
            width: 100%; background: var(--primary);
            border: 1.5px solid var(--border); color: var(--text);
            padding: 13px 16px 13px 44px; border-radius: 12px;
            font-size: 0.92rem; font-family: 'Poppins', sans-serif;
            transition: all 0.3s; outline: none;
        }
        .input-wrapper input:focus, .input-wrapper select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .input-wrapper input::placeholder { color: var(--text-muted); opacity: 0.6; }
        .form-check-input:checked { background-color: var(--accent); border-color: var(--accent); }
        .form-check-label { font-size: 0.85rem; color: var(--text-muted); }
        .btn-accent {
            width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: var(--primary); border: none; padding: 14px;
            border-radius: 12px; font-weight: 700; font-size: 1rem;
            font-family: 'Poppins', sans-serif; cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }
        .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--accent-glow); }
        .auth-link { color: var(--accent); font-weight: 600; text-decoration: none; }
        .auth-link:hover { text-decoration: underline; }
        .auth-footer { text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 0.88rem; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeInUp 0.6s ease forwards; }
        @media (max-width: 576px) { .auth-card { padding: 30px 20px; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="#">
                <span class="logo-icon"><i class="fas fa-futbol"></i></span>
                AI Offside Detection
            </a>
            <div class="d-flex gap-2">
                <a href="Login.html" class="nav-link"><i class="fas fa-sign-in-alt"></i> Login</a>
                <a href="Register.html" class="nav-link btn-nav" style="color: var(--primary) !important;">
                    <i class="fas fa-user-plus"></i> Register
                </a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card animate-in">
            <div class="auth-logo">
                <div class="icon-circle"><i class="fas fa-user-plus"></i></div>
                <h2>Create Account</h2>
                <p>Join AI Offside Detection System</p>
            </div>

            <form>
                <div class="section-divider">
                    <i class="fas fa-shield-alt"></i> Account Information
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label-custom">Username *</label>
                        <div class="input-wrapper">
                            <input type="text" placeholder="Choose username" required>
                            <i class="icon fas fa-user"></i>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Email *</label>
                        <div class="input-wrapper">
                            <input type="email" placeholder="your@email.com" required>
                            <i class="icon fas fa-envelope"></i>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label-custom">Password *</label>
                        <div class="input-wrapper">
                            <input type="password" placeholder="Min 6 characters" required>
                            <i class="icon fas fa-lock"></i>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Confirm Password *</label>
                        <div class="input-wrapper">
                            <input type="password" placeholder="Re-enter password" required>
                            <i class="icon fas fa-lock"></i>
                        </div>
                    </div>
                </div>

                <div class="section-divider">
                    <i class="fas fa-id-card"></i> Personal Details
                </div>

                <label class="form-label-custom">Full Name *</label>
                <div class="input-wrapper">
                    <input type="text" placeholder="Enter your full name" required>
                    <i class="icon fas fa-id-badge"></i>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label-custom">Phone Number</label>
                        <div class="input-wrapper">
                            <input type="tel" placeholder="03XX-XXXXXXX">
                            <i class="icon fas fa-phone"></i>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Date of Birth</label>
                        <div class="input-wrapper">
                            <input type="date">
                            <i class="icon fas fa-calendar"></i>
                        </div>
                    </div>
                </div>

                <label class="form-label-custom">Address</label>
                <div class="input-wrapper">
                    <input type="text" placeholder="Enter your address">
                    <i class="icon fas fa-map-marker-alt"></i>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label" for="terms">
                        I agree to the <a href="#" class="auth-link">Terms & Conditions</a>
                    </label>
                </div>

                <button type="button" class="btn-accent" onclick="window.location='Login.html'">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? 
                <a href="Login.html" class="auth-link">Sign In</a>
            </div>
        </div>
    </div>
</body>
</html>
